name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]  # Step 3: Trigger on PR merge/request

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image (Build & Push Stages)
        uses: docker/build-push-action@v4
        with:
          context: ./my-react-app
          file: ./my-react-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-project:latest

      - name: Deploy to Cloud (Deploy Stage)
        # Yahan hum Railway CLI ya simple webhook use kar sakte hain
        run: echo "Deploying latest image to Railway Cloud..."
